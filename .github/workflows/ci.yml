name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # Provide dummy values so config.py doesn't fail at startup.
          # Real secret values are never needed for unit tests.
          OPENROUTER_API_KEY: dummy_key_for_ci
          TAVILY_API_KEY: dummy_tavily_key
          API_TOKEN: ""
        run: python -m pytest tests/ -v --tb=short
